# Font
font_family      FiraCode Nerd Font Mono Retina
font_size        16.0
macos_thicken_font 0.25

# Text
term xterm-256color
shell_integration enabled
allow_hyperlinks yes
editor nvim

# macOS
macos_option_as_alt left
macos_titlebar_color background

# Window
enabled_layouts     splits,stack
window_padding_width 8
background_opacity   0.95
hide_window_decorations no

# Behavior
copy_on_select      clipboard
scrollback_lines    50000
cursor_blink_interval 0

# Tab bar
tab_bar_style       powerline

# Keyboard (macOS conventions)
map cmd+k       clear_terminal to_cursor active
map cmd+d       launch --location=vsplit
map cmd+shift+d launch --location=hsplit

# Audio
enable_audio_bell no

# Window close confirmation (asks when multiple tabs open)
confirm_os_window_close 2

# Tab management
map cmd+t       new_tab
map cmd+w       close_tab
map cmd+1       goto_tab 1
map cmd+2       goto_tab 2
map cmd+3       goto_tab 3
map cmd+4       goto_tab 4
map cmd+5       goto_tab 5
map cmd+6       goto_tab 6
map cmd+7       goto_tab 7
map cmd+8       goto_tab 8
map cmd+9       goto_tab 9

# Font size adjustment
map cmd+equal   change_font_size all +1.0
map cmd+minus   change_font_size all -1.0
map cmd+0       change_font_size all 0

# Scrollback search
map cmd+f       launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/less +G -R

# Navigate between splits
map cmd+left    neighboring_window left
map cmd+right   neighboring_window right
map cmd+up      neighboring_window up
map cmd+down    neighboring_window down

# Toggle layout (splits <-> stack)
map cmd+shift+l toggle_layout stack

# Reload config
map cmd+shift+r load_config_file

# --- Theme ---
include themes/catppuccin-mocha.conf
